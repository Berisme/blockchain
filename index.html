<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test</title>

  <!-- QR LIB -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>
<body>

<h2>Test thêm sản phẩm</h2>

<input id="name" placeholder="Tên"><br><br>
<input id="origin" placeholder="Nguồn gốc"><br><br>

<button onclick="add()">Thêm</button>

<p id="kq"></p>

<!-- HIỂN THỊ -->
<p id="info"></p>

<!-- QR -->
<div id="qr"></div>

<script>
let currentId = 0;

async function add() {
  const name = document.getElementById("name").value;
  const origin = document.getElementById("origin").value;

  try {
    const res = await fetch("/add", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, origin })
    });

    const text = await res.text();
    document.getElementById("kq").innerText = text;

    // HIỂN THỊ THÔNG TIN
    document.getElementById("info").innerHTML =
      "Tên: " + name + "<br>Nguồn gốc: " + origin;

    // LINK QR
    const url = window.location.origin + "/product/" + currentId;

    // TẠO QR
    document.getElementById("qr").innerHTML = "";

    QRCode.toCanvas(document.createElement("canvas"), url, function (err, canvas) {
      if (err) console.error(err);
      document.getElementById("qr").appendChild(canvas);
    });

    currentId++;

  } catch (err) {
    document.getElementById("kq").innerText = "Lỗi kết nối server!";
  }
}
</script>

</body>
</html>
