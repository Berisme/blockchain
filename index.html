<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test</title>
</head>
<body>

<h2>Test thêm sản phẩm</h2>

<input id="name" placeholder="Tên"><br><br>
<input id="origin" placeholder="Nguồn gốc"><br><br>

<button onclick="add()">Thêm</button>

<p id="kq"></p>

<script>
async function add() {
  const name = document.getElementById("name").value;
  const origin = document.getElementById("origin").value;

  try {
    const res = await fetch("/add", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, origin })
    });

    const text = await res.text();
    document.getElementById("kq").innerText = text;

  } catch (err) {
    document.getElementById("kq").innerText = "Lỗi kết nối server!";
  }
}
</script>

</body>
</html>
