<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Truy xuất sản phẩm</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    #qr {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Thêm sản phẩm</h2>

  <input id="name" placeholder="Tên sản phẩm"><br>
  <input id="origin" placeholder="Nguồn gốc"><br>

  <button onclick="add()">Thêm</button>

  <p id="kq"></p>

  <div id="qr"></div>
</div>

<script>
async function add() {
  const name = document.getElementById("name").value;
  const origin = document.getElementById("origin").value;

  try {
    const res = await fetch("https://blockchaintest.onrender.com/add", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, origin })
    });

    const text = await res.text();
    document.getElementById("kq").innerText = text;

    // tạo QR
    const url = "https://blockchaintest.onrender.com/add";
    document.getElementById("qr").innerHTML = "";
    QRCode.toCanvas(document.createElement("canvas"), url, function (err, canvas) {
      document.getElementById("qr").appendChild(canvas);
    });

  } catch (err) {
    document.getElementById("kq").innerText = "Lỗi kết nối server!";
  }
}
</script>

</body>
</html>
